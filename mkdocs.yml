site_name: Algorithms & Data Structures
site_url: https://lgopractice.github.io/
theme:
  name: material
  font:
    text: "CT"
    code: "Google Sans Code Medium"
  features:
    - content.code.copy
    - content.code.annotate
    - content.tooltips
  # Setup for theme switch https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/#color-palette-toggle
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: white
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
  icon:
    admonition:
      tip: material/lightning-bolt

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - pymdownx.mark

extra_javascript:
  - assets/mathjax.js
  - assets/spoilers.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - assets/custom.css
  - assets/spoilers.css

nav:
  - Stack: 
    - Introduction: "stack/index.md"
    - Problems: "stack/problems.md"
    - Foundations: 
      - Valid Parentheses: "stack/02.md"
      - Implement Queue using Two Stacks: "stack/03.md"
      - Implement Stack using Queues: "stack/04.md"
